<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#030305"/>
  <!-- grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="240" cy="190" rx="340" ry="340" fill="url(#orb1)"/>
  <ellipse cx="960" cy="440" rx="380" ry="380" fill="url(#orb2)"/>
  <!-- badge -->
  <rect x="476" y="130" width="248" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="154" font-family="ui-monospace,monospace" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="3">NEXT-GEN LOGIC ENGINE</text>
  <!-- main title -->
  <text x="600" y="270" font-family="ui-sans-serif,system-ui,sans-serif" font-size="86" font-weight="900" fill="white" text-anchor="middle">Boolean</text>
  <text x="600" y="370" font-family="ui-sans-serif,system-ui,sans-serif" font-size="86" font-weight="900" fill="url(#titleGrad)" text-anchor="middle">Satisfiability</text>
  <!-- subtitle -->
  <text x="600" y="430" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" fill="#64748b" text-anchor="middle">Boolean SAT solver · exhaustive truth-table enumeration</text>
  <!-- bottom chips -->
  <rect x="380" y="490" width="120" height="36" rx="8" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="440" y="514" font-family="ui-monospace,monospace" font-size="14" fill="#22d3ee" text-anchor="middle">P ∨ Q ∧ ¬R</text>
  <rect x="520" y="490" width="160" height="36" rx="8" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.25)" stroke-width="1"/>
  <text x="600" y="514" font-family="ui-monospace,monospace" font-size="14" fill="#a855f7" text-anchor="middle">SATISFIABLE ✓</text>
  <rect x="700" y="490" width="120" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="760" y="514" font-family="ui-monospace,monospace" font-size="14" fill="#64748b" text-anchor="middle">2 / 8 rows</text>
</svg>
